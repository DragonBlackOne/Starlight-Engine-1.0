name: Starlight Engine Mark-C CI

on:
  push:
    branches: [ "main", "dev" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-c11:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Configure CMake
      run: cmake -S . -B build

    - name: Build Project
      run: cmake --build build --config Release

    - name: Verify Executables
      run: |
        if (Test-Path "build\Release\starlight_pong_deluxe.exe") {
            Write-Host "Pong Deluxe: OK"
        } else {
            Write-Error "Compilation Failed: Executable not found."
            exit 1
        }

