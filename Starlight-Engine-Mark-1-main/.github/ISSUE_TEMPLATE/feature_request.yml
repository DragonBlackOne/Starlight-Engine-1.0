name: Feature Request
description: Sugira uma ideia, novo sistema WGPU ou melhoria.
title: "[FEATURE] "
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Qual o problema que essa feature resolve?
      description: Há algo frustrante ou uma limitação na Engine no momento?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Solução Proposta (Como implementariamos?)
      description: Descreva como isso poderia ser abordado arquiteturalmente em Rust ou Python.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Alguma outra forma (ex: usar PyO3 / DearPyGui) de resolver isso?
    validations:
      required: false
