version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/crates/engine_core"
    schedule:
      interval: "weekly"
    groups:
      rust-deps:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/crates/engine_render"
    schedule:
      interval: "weekly"
    groups:
      rust-deps:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-deps:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
